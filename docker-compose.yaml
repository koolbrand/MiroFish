version: '3.8'

services:
  neo4j:
    image: neo4j:5.26.2
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-mirofish2026}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 90s

  mirofish:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - NODE_ENV=production
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-mirofish2026}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
    volumes:
      - mirofish_uploads:/app/backend/uploads
      - mirofish_logs:/app/backend/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  neo4j_data:
  mirofish_uploads:
  mirofish_logs:
