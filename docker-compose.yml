version: '3.8'

services:
  mirofish:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mirofish
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - NODE_ENV=production
    volumes:
      - ./backend/uploads:/app/backend/uploads
      - ./backend/logs:/app/backend/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Para Coolify: descomenta esto si necesitas conectar a otros servicios
    # networks:
    #   - mirofish-network

