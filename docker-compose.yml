version: '3.8'

services:
  neo4j:
    image: neo4j:5.26.2
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-mirofish2026}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
      # Coolify injects all NEO4J_* env vars into every container.
      # Disable strict config validation so Neo4j ignores unknown vars
      # like NEO4J_URI, NEO4J_USER, NEO4J_PASSWORD (valid for the app, not for Neo4j).
      NEO4J_server_config_strict__validation_enabled: "false"
    volumes:
      - neo4j_data:/data

  mirofish:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8000"
    restart: unless-stopped
    depends_on:
      - neo4j
    environment:
      - PYTHONUNBUFFERED=1
      - NODE_ENV=production
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-mirofish2026}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      # Graphiti graph-extraction LLM (needs reliable json_schema support).
      # Defaults to MiniMax-Text-01; simulation keeps using LLM_MODEL_NAME.
      - GRAPHITI_LLM_MODEL_NAME=${GRAPHITI_LLM_MODEL_NAME:-MiniMax-Text-01}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-}
    volumes:
      - mirofish_uploads:/app/backend/uploads
      - mirofish_logs:/app/backend/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  neo4j_data:
  mirofish_uploads:
  mirofish_logs:
