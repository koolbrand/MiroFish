version: '3.8'

services:
  neo4j:
    image: neo4j:5.26.2
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
      # Coolify injects all NEO4J_* env vars into every container.
      # Disable strict config validation so Neo4j ignores unknown vars
      # like NEO4J_URI, NEO4J_USER, NEO4J_PASSWORD (valid for the app, not for Neo4j).
      NEO4J_server_config_strict__validation_enabled: "false"
    volumes:
      - neo4j_data:/data
    # Contain Neo4j RAM usage so it can't starve the host.
    # Heap is 1g max + ~512m for page cache and overhead → 2g is safe.
    mem_limit: 2g
    mem_reservation: 1g

  mirofish:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8000"
    restart: unless-stopped
    depends_on:
      - neo4j
    environment:
      - PYTHONUNBUFFERED=1
      - NODE_ENV=production
      - FLASK_DEBUG=false
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY}
      - API_AUTH_REQUIRED=${API_AUTH_REQUIRED:-true}
      - API_AUTH_TOKEN=${API_AUTH_TOKEN:-}
      - POCKETBASE_URL=${POCKETBASE_URL:-https://pocketbase.koolgrowth.com}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:?Set NEO4J_PASSWORD}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      # Graphiti graph-extraction LLM (independent provider for reliable
      # json_schema support — e.g. DeepSeek-V3 or Qwen-Plus).  Each var
      # falls back to its LLM_* counterpart when unset.
      - GRAPHITI_LLM_API_KEY=${GRAPHITI_LLM_API_KEY:-}
      - GRAPHITI_LLM_BASE_URL=${GRAPHITI_LLM_BASE_URL:-}
      - GRAPHITI_LLM_MODEL_NAME=${GRAPHITI_LLM_MODEL_NAME:-}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-}
    volumes:
      - mirofish_uploads:/app/backend/uploads
      - mirofish_logs:/app/backend/logs
    # Contain OASIS (BERT + simulation) memory usage so a runaway
    # simulation can only kill MiroFish itself, never cascade into other
    # Coolify apps on the same host. If the process exceeds mem_limit
    # Docker SIGKILLs it and the container auto-restarts thanks to
    # `restart: unless-stopped`. The localized SIGKILL/OOM error in the
    # UI tells the user to reduce agents or extend RAM.
    mem_limit: 4g
    mem_reservation: 2g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  neo4j_data:
  mirofish_uploads:
  mirofish_logs:
